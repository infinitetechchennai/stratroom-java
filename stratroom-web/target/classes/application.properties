# Disable SSL auto-configuration - use HTTP only
# The SSL values are loaded from external stratroom-web.properties for @Value injection
# but we don't want Spring Boot to actually enable SSL

# This overrides any server.ssl.* from external config
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
logging.level.org.springframework.web=DEBUG
logging.level.org.apache.catalina.core=DEBUG
logging.level.org.apache.jasper=DEBUG
logging.level.org.apache.tomcat.util=DEBUG
