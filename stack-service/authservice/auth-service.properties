# ===========================
# authservice.properties
# Local development configuration
# ===========================

# Server
server.port=8081
server.servlet.context-path=/authservice

# DB Service
dbservice.url=http://localhost:8083/db-service
dbservice.validate.user=http://localhost:8083/db-service/user/validate

# Jasypt
auth.jasypt.algorithm=PBEWithMD5AndDes
auth.jasypt.password=123456

# JWT
jwt.secret=123456
jwt.tokenexpiration=900

# SSL disabled for local dev (HTTP only)

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/orgstructure?useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456
