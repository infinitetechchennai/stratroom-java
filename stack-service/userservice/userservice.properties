# Server
server.port=8082
server.servlet.context-path=/userservice

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/orgstructure?useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# Auth Service endpoints
authservice.url=http://localhost:8081/authservice/

# JWT Configuration
jwt.verification.enabled=false
# secret MUST match authservice and be provided via the JWT_SECRET environment variable
jwt.secret=${JWT_SECRET}
jwt.tokenexpiration=900

# DB Service base URL
dbservice.url=http://localhost:8083/db-service/

