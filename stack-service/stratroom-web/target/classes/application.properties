# Disable SSL auto-configuration - use HTTP only
# The SSL values are loaded from external stratroom-web.properties for @Value injection
# but we don't want Spring Boot to actually enable SSL

# This overrides any server.ssl.* from external config
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.main.allow-circular-references=true

# Spring Boot 3 / Spring 6 changed the default URL matcher to PathPatternParser,
# which rejects legacy Ant patterns like /foo/**/bar. Revert to the old AntPathMatcher.
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
# Disable content-negotiation path-extension stripping. With ant_path_matcher this
# was previously claiming endpoints like /user/permissions as a static resource
# named "permissions" -> 404 ("No static resource user/permissions"). Turning it
# off keeps suffix patterns from shadowing the @GetMapping handlers in RoleController.
spring.mvc.contentnegotiation.favor-path-extension=false
spring.mvc.pathmatch.use-suffix-pattern=false
# Spring Boot 3 disabled trailing-slash matching by default. The legacy frontend
# AJAX calls (e.g. /stratroom/user/permissions) rely on the handler matching with
# or without a trailing slash. Without this, /user/permissions falls through to
# the static-resource handler and returns 404 ("No static resource user/permissions"),
# which the admin.js permission loader treats as empty permissions and shows
# "You don't have any access, pls contact administrator".
spring.mvc.pathmatch.use-trailing-slash-match=true
