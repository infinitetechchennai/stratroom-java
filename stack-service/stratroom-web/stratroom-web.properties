# ===========================
# stratroom-web.properties
# Local development configuration
# ===========================

# Mail Configuration
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.username=noreply@example.com
mail.smtp.password=password
mail.smtp.protocol=smtp
mail.smtp.auth=true
mail.smtp.connectionTimeout=5000
mail.smtp.timeout=5000
mail.smtp.writeTimeout=5000
mail.smtp.startSSLEnable=false
mail.smtp.startTlsEnable=true

# Server
server.port=8080
server.servlet.context-path=/stratroom
server.servlet.session.timeout=3600

# SSL disabled for local dev (HTTP only - SecurityConfig uses empty defaults)


# JSP View Resolution
spring.mvc.view.prefix=/view/
spring.mvc.view.suffix=.jsp

# Security
security.invalidsessionurl=/stratroom/login
security.saml2.metadata-url=

# JWT
jwt.generation.enabled=true

# SAML
saml.sso.auth.host=

# Upload paths
upload.path=/uploads
upload.path.local=C:/uploads
template.upload.file.path=C:/uploads/templates
etl.upload.file.path=C:/uploads/etl

# Employee path keys
emp.path.keys=

# Intercept flag
interCeptFlag=true

