# =============================================
# Stratroom Backend - Single Application Config
# Replaces: authservice(8081) + userservice(8082) +
#           db-service(8083) + scorecard-service(8084) +
#           etl-service(8086) + licenseservice(embedded)
# =============================================

# ===== Server (Netty / WebFlux) =====
server.port=8085
spring.main.web-application-type=reactive
spring.reactor.context-propagation=auto

# Context path — WebFlux uses spring.webflux.base-path (not server.servlet.context-path)
spring.webflux.base-path=/api

# ===== Single Database Connection =====
spring.datasource.url=jdbc:postgresql://localhost:5432/new?currentSchema=orgstructure
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1234

# ===== R2DBC (reactive driver — repositories migrate in later phases) =====
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/new?schema=orgstructure
spring.r2dbc.username=postgres
spring.r2dbc.password=1234
# ===== JPA =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.format-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming-strategy=org.hibernate.cfg.DefaultNamingStrategy
# DB uses mixed column names (orgId, userAccess + snake_case). Keep @Column names as-is.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.current_session_context_class=thread
spring.main.allow-circular-references=true

# ===== DB module legacy properties =====
datasource=postgresql
db.name=orgstructure
dp.port=5432
authentication=local
ldap.url=ldap://localhost:389
ldap.bind.dn=cn=admin,dc=example,dc=com
ldap.bind.password=${LDAP_BIND_PASSWORD:}
ldap.user.dn=uid
ldap.search.attribute=mail
backup.script.file.path=C:/uploads/backup
enable.email.notification=false
disable.email.suffix=
from.email=noreply@example.com
license.validate.url=http://localhost:8085/api/license/validate

# ===== JWT (from authservice) =====
jwt.secret=${JWT_SECRET:rBf2DbeYvqYFyyL7rU82wLE7Modgto7kkFXjaovFFySgqSmya7oFX6Oe3769XUG}
jwt.tokenexpiration=900
jwt.generation.enabled=true
jwt.verification.enabled=true

# ===== Jasypt Encryption (from authservice) =====
auth.jasypt.algorithm=PBEWithMD5AndDes
auth.jasypt.password=${JASYPT_PASSWORD:secret}

# ===== Mail (from db-service / stratroom-web) =====
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.username=noreply@example.com
mail.smtp.password=${MAIL_SMTP_PASSWORD:}
mail.smtp.protocol=smtp
mail.smtp.auth=true
mail.smtp.startTlsEnable=true
mail.smtp.connectionTimeout=5000
mail.smtp.timeout=5000
mail.smtp.writeTimeout=5000
spring.mail.host=${mail.smtp.host}
spring.mail.port=${mail.smtp.port}
spring.mail.username=${mail.smtp.username}
spring.mail.password=${mail.smtp.password}
spring.mail.properties.mail.smtp.auth=${mail.smtp.auth}
spring.mail.properties.mail.smtp.starttls.enable=${mail.smtp.startTlsEnable}

# ===== License (from licenseservice) =====
license.file.path=${LICENSE_FILE_PATH:/uploads/license.txt}

# ===== Upload Paths (from stratroom-web/etl) =====
upload.path=/uploads
upload.path.local=C:/uploads
template.upload.file.path=C:/uploads/templates
etl.upload.file.path=C:/uploads/etl

# ===== ETL Batch Config =====
batch.all.organization=false
entry.start.day=1
entry.end.day=1
kpi.notification.day=1
kpi.notification.hour=0
kpi.notification.minute=0

# ===== Amazon S3 (leave blank for local dev) =====
amazonProperties.endpointUrl=
amazonProperties.bucketName=
amazonProperties.accessKey=
amazonProperties.secretKey=

# ===== Azure AD / SSO =====
saml.sso.auth.host=

# ===== Logging =====
log.file.path=logs/stratroom-backend.log
log.max.size=10MB
log.max.history=30
log.level=INFO
log.root.level=INFO
logging.file.name=logs/stratroom-backend.log
# R2DBC is on classpath for future use but no R2DBC repos exist yet; suppress 140 scan warnings.
logging.level.org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport=WARN

# ===== Intercept =====
interCeptFlag=true

# ===== Data Initialization (first-run admin seed) =====
admin.email=${ADMIN_EMAIL:admin@example.com}
admin.password=${ADMIN_PASSWORD:admin}
admin.org.name=Stratroom

# ===== HTTP Response Compression =====
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/html,text/xml,text/css,application/javascript
server.compression.min-response-size=1024

# ===== Upload limits =====
spring.codec.max-in-memory-size=100MB
spring.webflux.multipart.max-in-memory-size=100MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
