<script>

function getBase64Image(url) {
    return new Promise((resolve) => {
        let img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = function () {
            let canvas = document.createElement("canvas");
            canvas.width = this.width;
            canvas.height = this.height;
            let ctx = canvas.getContext("2d");
            ctx.drawImage(this, 0, 0);
            resolve(canvas.toDataURL("image/png"));
        };
        img.src = url;
    });
}

const riskImageUrls = {
    green: "https://stratroom.io/projects/mg-portal-html/assets/images/icons/buzzer-green-i.svg",
    yellow: "https://stratroom.io/projects/mg-portal-html/assets/images/icons/buzzer-yellow-i.svg",
    red: "https://stratroom.io/projects/mg-portal-html/assets/images/icons/buzzer-red-i.svg"
};
const flagImageUrls = {
    green: "https://stratroom.io/projects/mg-portal-html/assets/images/icons/flag-green-i.svg",
    yellow: "https://stratroom.io/projects/mg-portal-html/assets/images/icons/flag-yellow-i.svg",
    red: "https://stratroom.io/projects/mg-portal-html/assets/images/icons/flag-red-i.svg"
};
const trendImageUrls = {
    up: "https://stratroom.io/projects/mg-portal-html/assets/images/icons/up-i.png",
    down: "https://stratroom.io/projects/mg-portal-html/assets/images/icons/down-i.png",
};
const riskImages = {};
const flagImages = {};
const trendImages = {};

async function preloadImages() {
    await Promise.all(
        Object.entries(riskImageUrls).map(async ([key, url]) => {
            riskImages[key] = await getBase64Image(url);
        })
    );
    await Promise.all(
        Object.entries(flagImageUrls).map(async ([key, url]) => {
            flagImages[key] = await getBase64Image(url);
        })
    );
    await Promise.all(
        Object.entries(trendImageUrls).map(async ([key, url]) => {
            trendImages[key] = await getBase64Image(url);
        })
    );
}

const { jsPDF } = window.jspdf;

function processTableData(items, level = 0) {
    let tableRows = [];
    items.forEach(item => {
        tableRows.push([
            item.flag[0]?.status || "",
            "\u00A0\u00A0".repeat(level) + item.id,
            "\u00A0\u00A0".repeat(level) + item.name,
            item.period || "",
            item.score || "",
            item.trend[0]?.status || "",
            item.baseline || "",
            item.actual || "",
            item.target || "",
            item.risk[0]?.status || ""
        ]);

        if (item.children?.length) {
            tableRows = tableRows.concat(processTableData(item.children, level + 1));
        }
    });
    return tableRows;
}

async function generatePDF() {
    await preloadImages();
    let pdf = new jsPDF();
    let pageWidth = pdf.internal.pageSize.width;
    let pageHeight = pdf.internal.pageSize.height;
    const logoUrl = "https://stratroom.io/assets/images/logo.png";

    function header() {
        pdf.addImage(logoUrl, "PNG", 10, 5, 50, 10);
        pdf.setFontSize(13).setFont("helvetica", "bold");
        pdf.text("Execution Assessment Report", pageWidth - 10, 15, { align: "right" });
        pdf.line(10, 22, pageWidth - 10, 22);
        return 30;
    }

    function footer(pageNumber) {
        pdf.setFontSize(8);
        pdf.text(`Copyright © ${new Date().getFullYear()}, StratRoom. All Rights Reserved.`, pageWidth / 2, pageHeight - 10, { align: "center" });
        pdf.line(10, pageHeight - 15, pageWidth - 10, pageHeight - 15);
    }

    let y = header();

    data.forEach(section => {
        if (y + (section.tabledata.length * 6 + 16) > pageHeight - 40) {
            pdf.addPage();
            y = header();
        }
        pdf.setFontSize(13).setFont("helvetica", "bold");
        pdf.text(`${section.title} (Total Score: ${section.totalScore})`, 10, y);
        y += 5;

        pdf.autoTable({
            startY: y,
            head: [["Flag", "ID", "Name", "Period", "Score", "Trend", "Baseline", "Actual", "Target", "Risk"]],
            body: processTableData(section.tabledata),
            theme: 'grid',
            styles: { fontSize: 10, cellPadding: 2, lineColor: [201, 201, 201] },
            headStyles: { fillColor: [147, 69, 120], textColor: [255, 255, 255] },
            margin: { top: 8, left: 10, right: 10 },
            pageBreak: 'avoid',
            didDrawCell: function (data) {
                let imgSize = 4;
                if (data.section === "body") {
                   
                    if (data.column.index === 0) {
                        let flagStatus = data.row.raw[0]?.toLowerCase();
                        if (flagImages[flagStatus]) {
                            pdf.setFillColor(255, 255, 255);
                    pdf.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height, "F");
                    pdf.setDrawColor(201,201,201); 
                    pdf.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height);
                            pdf.addImage(flagImages[flagStatus], "PNG", data.cell.x + (data.cell.width - imgSize) / 2, data.cell.y + (data.cell.height - imgSize) / 2, imgSize, imgSize);
                            
                        }
                    }
                    if (data.column.index === 5) {
                        let trendStatus = data.row.raw[5]?.toLowerCase();
                        if (trendImages[trendStatus]) {
                            pdf.setFillColor(255, 255, 255);
                    pdf.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height, "F");
                    pdf.setDrawColor(201,201,201); 
                    pdf.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height);
                            pdf.addImage(trendImages[trendStatus], "PNG", data.cell.x + (data.cell.width - imgSize) / 2, data.cell.y + (data.cell.height - imgSize) / 2, imgSize, imgSize);
                        }
                    }
                    if (data.column.index === 9) {
                        let riskStatus = data.row.raw[9]?.toLowerCase();
                        if (riskImages[riskStatus]) {
                            pdf.setFillColor(255, 255, 255);
                    pdf.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height, "F");
                    pdf.setDrawColor(201,201,201); 
                    pdf.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height);
                            pdf.addImage(riskImages[riskStatus], "PNG", data.cell.x + (data.cell.width - imgSize) / 2, data.cell.y + (data.cell.height - imgSize) / 2, imgSize, imgSize);
                        }
                    }
                }
            }
        });
        y = pdf.lastAutoTable.finalY + 10;
    });

    for (let i = 1; i <= pdf.internal.getNumberOfPages(); i++) {
        pdf.setPage(i);
        footer(i);
    }
    pdf.save("report.pdf");
}

</script>
