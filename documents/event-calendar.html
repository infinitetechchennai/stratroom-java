  <script>
    document.addEventListener('DOMContentLoaded', function () {

      // Format date for sidebar display
      function formatEventDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        return d.toLocaleDateString('en-US', {
          month: 'long', day: 'numeric', year: 'numeric'
        }) + ', ' + d.toLocaleTimeString('en-US', {
          hour: 'numeric', minute: '2-digit'
        }).toLowerCase();
      }

      // Build sidebar card HTML
      function buildSidebarCard(event) {
        var accent = event.accentColor || event.color || '#1a9a8a';
        var fromDate = formatEventDate(event.start);
        var toDate = event.end ? formatEventDate(event.end) : fromDate;

        var card = document.createElement('div');
        card.className = 'event-sidebar-card';
        card.style.setProperty('--card-accent', accent);
        card.innerHTML =
          '<h6 class="event-card-title">' + event.title + '</h6>' +
          '<p class="event-card-date">' +
          '<span class="label">From:</span> ' + fromDate + '<br>' +
          '<span class="label">To:</span> ' + toDate +
          '</p>';
        return card;
      }

      // Fetch events from JSON
      fetch('assets/json/event-calendar.json')
        .then(function (response) { return response.json(); })
        .then(function (events) {

          var sidebarBody = document.getElementById('eventSidebarBody');
          var sidebarTitle = document.getElementById('eventSidebarTitle');

          // --- Update sidebar based on calendar's visible date range ---
          function updateSidebar(viewStart, viewEnd) {
            sidebarBody.innerHTML = '';

            var today = new Date();
            today.setHours(0, 0, 0, 0);

            // Check if the view is showing a past period
            var isPast = viewEnd <= today;

            var sidebarEvents;

            if (isPast) {
              // Past view: show only events within that date range
              sidebarTitle.textContent = 'Completed Events';
              sidebarEvents = events.filter(function (event) {
                var evStart = new Date(event.start);
                var evEnd = event.end ? new Date(event.end) : new Date(event.start);
                return evStart < viewEnd && evEnd >= viewStart;
              });
            } else {
              // Current/future view: show events from view start onward (running + upcoming)
              sidebarTitle.textContent = 'Running & Upcoming Events';
              sidebarEvents = events.filter(function (event) {
                var evEnd = event.end ? new Date(event.end) : new Date(event.start);
                return evEnd >= viewStart;
              });
            }

            // Populate sidebar cards
            if (sidebarEvents.length === 0) {
              sidebarBody.innerHTML =
                '<div class="event-sidebar-empty">' +
                  '<i data-lucide="calendar-x-2" style="width:36px; height:36px;"></i>' +
                  '<p>No events for this period</p>' +
                '</div>';
              if (window.lucide) lucide.createIcons();
            } else {
              sidebarEvents.forEach(function (event) {
                sidebarBody.appendChild(buildSidebarCard(event));
              });
            }
          }

          // --- Initialize FullCalendar ---
          var calendarEl = document.getElementById('fullCalendar');
          var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
              left: 'prev,next today',
              center: 'title',
              right: 'dayGridMonth,timeGridWeek,timeGridDay,listMonth'
            },
            buttonText: {
              today: 'Today',
              month: 'Month',
              week: 'Week',
              day: 'Day',
              list: 'List'
            },
            height: 'auto',
            navLinks: true,
            editable: true,
            dayMaxEvents: true,
            events: events,
            eventDisplay: 'block',
            eventTimeFormat: {
              hour: 'numeric',
              minute: '2-digit',
              meridiem: 'short'
            },
            datesSet: function (info) {
              updateSidebar(info.start, info.end);
            },
            eventClick: function (info) {
              info.jsEvent.preventDefault();
              var event = info.event;

              // Title
              document.getElementById('modalEventTitle').textContent = event.title;

              // Start date
              var startStr = event.start ? event.start.toLocaleDateString('en-US', {
                weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
              }) : '—';
              document.getElementById('modalEventStart').textContent = startStr;

              // End date
              var endStr = '—';
              if (event.end) {
                var endDisplay = new Date(event.end);
                endDisplay.setDate(endDisplay.getDate() - 1);
                endStr = endDisplay.toLocaleDateString('en-US', {
                  weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
                });
              }
              document.getElementById('modalEventEnd').textContent = endStr;

              // Status badge
              var today = new Date();
              today.setHours(0, 0, 0, 0);
              var statusEl = document.getElementById('modalEventStatus');
              var evEnd = event.end ? new Date(event.end) : new Date(event.start);
              if (evEnd < today) {
                statusEl.textContent = 'Completed';
                statusEl.className = 'badge rounded-pill bg-secondary';
              } else if (event.start <= today) {
                statusEl.textContent = 'In Progress';
                statusEl.className = 'badge rounded-pill bg-success';
              } else {
                statusEl.textContent = 'Upcoming';
                statusEl.className = 'badge rounded-pill bg-primary';
              }

              var modal = new bootstrap.Modal(document.getElementById('eventDetailModal'));
              modal.show();
            }
          });

          calendar.render();
        })
        .catch(function (err) {
          console.error('Failed to load events:', err);
        });
    });
  </script>
