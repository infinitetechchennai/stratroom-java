apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: stratroom-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/kalee/stratroom-java-backend:latest
        imagePullPolicy: Always
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/clean?currentSchema=orgstructure
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: stratroom-secrets
              key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stratroom-secrets
              key: DB_PASSWORD
        - name: SPRING_R2DBC_URL
          value: r2dbc:postgresql://postgres:5432/clean?schema=orgstructure
        - name: SPRING_R2DBC_USERNAME
          valueFrom:
            secretKeyRef:
              name: stratroom-secrets
              key: DB_USERNAME
        - name: SPRING_R2DBC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stratroom-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: stratroom-secrets
              key: JWT_SECRET
        - name: JASYPT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stratroom-secrets
              key: JASYPT_PASSWORD
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stratroom-secrets
              key: ADMIN_PASSWORD
        # Important: Setting ROOT logging level to ERROR to prevent spam
        - name: LOGGING_LEVEL_ROOT
          value: ERROR
        ports:
        - containerPort: 8085
        # Add volume for /uploads if persistence is needed, similar to postgres
        volumeMounts:
        - name: uploads-volume
          mountPath: /uploads
      volumes:
      - name: uploads-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: stratroom-prod
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8085
      targetPort: 8085
